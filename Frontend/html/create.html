<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe Maker | Create Outfit</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/create.css">
</head>
<body class="pb-20 pt-24">

    <nav class="bg-white/90 backdrop-blur-md px-6 md:px-12 py-4 flex flex-col md:flex-row justify-between items-center fixed top-0 left-0 right-0 z-50 shadow-sm border-b border-[#e6e0d5]">
        <div class="flex items-center gap-3 mb-3 md:mb-0">
            <div class="text-[#8c7862] text-2xl"><i class="fas fa-tshirt"></i></div>
            <span class="font-bold text-xl text-gray-800">Wardrobe Maker</span>
        </div>
        <div class="flex flex-wrap justify-center gap-2 md:gap-3 text-gray-500">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="wardrobe.html" class="nav-item"><i class="fas fa-vest"></i> Wardrobe</a>
            <a href="create.html" class="nav-item active-link">
                <i class="fas fa-wand-magic-sparkles"></i> Create
            </a>
            <a href="calendar.html" class="nav-item"><i class="fas fa-calendar-alt"></i> Calendar</a>
            <a href="lookbook.html" class="nav-item"><i class="fas fa-images"></i> Lookbook</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-6 md:mt-8 px-4">
        <div class="create-banner p-8 md:p-12 text-white flex flex-col md:flex-row justify-between items-center gap-6 mb-8 shadow-xl">
            <div>
                <h1 class="text-3xl md:text-5xl font-bold mb-2">Outfit Canvas</h1>
                <p class="text-sm md:text-lg opacity-90 font-light">Build and save your signature looks</p>
            </div>
            <button onclick="randomizeOutfit()" class="bg-white text-[#8c7862] w-full md:w-auto px-8 py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg transition hover:scale-105 active:scale-95">
                <i class="fas fa-random"></i> Quick Roll
            </button>
        </div>

        <!-- Mode Switcher -->
        <div class="bg-white p-4 rounded-2xl border border-[#e6e0d5] shadow-sm mb-8">
            <div class="flex items-center justify-center gap-4">
                <span class="text-sm font-bold text-gray-400 uppercase tracking-widest">Outfit Mode:</span>
                <div class="flex gap-2">
                    <button onclick="setOutfitMode('standard')" id="btn-standard" class="mode-btn active px-6 py-2 rounded-xl font-bold text-sm transition">
                        <i class="fas fa-tshirt mr-2"></i>Standard
                    </button>
                    <button onclick="setOutfitMode('dress')" id="btn-dress" class="mode-btn px-6 py-2 rounded-xl font-bold text-sm transition">
                        <i class="fas fa-vest-patches mr-2"></i>Dress
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <div class="bg-white p-8 rounded-[2rem] border border-[#e6e0d5] shadow-sm space-y-6">
                    <div id="slot-top-container">
                        <span class="slot-label"><i class="fas fa-shirt mr-1"></i> Top</span>
                        <div id="slot-top" class="canvas-slot">
                            <div class="slot-empty">
                                <i class="fas fa-plus"></i>
                                <span>Click to select</span>
                            </div>
                        </div>
                    </div>
                    <div id="slot-bottom-container">
                        <span class="slot-label"><i class="fas fa-venus-mars mr-1"></i> Bottom</span>
                        <div id="slot-bottom" class="canvas-slot">
                            <div class="slot-empty">
                                <i class="fas fa-plus"></i>
                                <span>Click to select</span>
                            </div>
                        </div>
                    </div>
                    <div id="slot-dress-container" class="hidden">
                        <span class="slot-label"><i class="fas fa-vest-patches mr-1"></i> Dress</span>
                        <div id="slot-dress" class="canvas-slot">
                            <div class="slot-empty">
                                <i class="fas fa-plus"></i>
                                <span>Click to select</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <span class="slot-label"><i class="fas fa-shoe-prints mr-1"></i> Footwear</span>
                        <div id="slot-footwear" class="canvas-slot">
                            <div class="slot-empty">
                                <i class="fas fa-plus"></i>
                                <span>Click to select</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-4">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Outfit Name</label>
                        <input type="text" id="outfitName" placeholder="e.g. Casual Friday" class="w-full bg-gray-50 border border-[#e6e0d5] rounded-xl px-4 py-3 outline-none focus:ring-1 focus:ring-[#8c7862]">
                        <button onclick="saveOutfit()" class="w-full bg-[#8c7862] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-[#4a4238] transition mt-4">
                            Save to Lookbook
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div id="inv-top-container" class="inventory-section">
                    <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">Available Tops</h3>
                    <div id="inv-top" class="scroll-area"></div>
                </div>
                <div id="inv-bottom-container" class="inventory-section">
                    <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">Available Bottoms</h3>
                    <div id="inv-bottom" class="scroll-area"></div>
                </div>
                <div id="inv-dress-container" class="inventory-section hidden">
                    <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">Available Dresses</h3>
                    <div id="inv-dress" class="scroll-area"></div>
                </div>
                <div class="inventory-section">
                    <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">Available Shoes</h3>
                    <div id="inv-footwear" class="scroll-area"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="flashcardOverlay">
        <div class="flashcard">
            <div class="flex justify-center -space-x-4 mb-8" id="flashcardImages"></div>
            <h2 id="flashcardTitle" class="text-2xl font-bold text-gray-800 mb-1"></h2>
            <p class="text-[#8c7862] font-bold uppercase tracking-widest text-[10px] mb-8">Added to Lookbook</p>
            <button onclick="closeFlashcard()" class="w-full bg-[#8c7862] text-white py-3 rounded-xl font-bold">Awesome!</button>
        </div>
    </div>

    <script src="js/create.js"></script>
</body>
</html>
