<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe Maker | Calendar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/calendar.css">
</head>
<body class="pb-20 pt-24">

    <nav class="bg-white/90 backdrop-blur-md px-6 md:px-12 py-4 flex flex-col md:flex-row justify-between items-center fixed top-0 left-0 right-0 z-50 shadow-sm border-b border-[#e6e0d5]">
        <div class="flex items-center gap-3 mb-3 md:mb-0">
            <div class="text-[#8c7862] text-2xl"><i class="fas fa-tshirt"></i></div>
            <span class="font-bold text-xl text-gray-800">Wardrobe Maker</span>
        </div>
        <div class="flex flex-wrap justify-center gap-2 md:gap-3 text-gray-500">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="wardrobe.html" class="nav-item"><i class="fas fa-vest"></i> Wardrobe</a>
            <a href="create.html" class="nav-item"><i class="fas fa-wand-magic-sparkles"></i> Create</a>
            <a href="calendar.html" class="nav-item active-link">
                <i class="fas fa-calendar-alt"></i> Calendar
            </a>
            <a href="lookbook.html" class="nav-item"><i class="fas fa-images"></i> Lookbook</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

        <div class="lg:col-span-2 bg-white rounded-[2.5rem] p-8 shadow-sm border border-[var(--card-border)]">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 id="currentMonthYear" class="font-bold text-2xl text-[var(--text-main)]"></h2>
                <div class="flex gap-4 text-gray-400 text-xl">
                    <i class="fas fa-chevron-left cursor-pointer hover:text-[var(--earth-brown)] transition" onclick="prevMonth()"></i>
                    <i class="fas fa-chevron-right cursor-pointer hover:text-[var(--earth-brown)] transition" onclick="nextMonth()"></i>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-4 text-center mb-4">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sun</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Mon</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Tue</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Wed</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Thu</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Fri</span>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sat</span>
            </div>

            <div class="grid grid-cols-7 gap-3" id="calendarGrid"></div>
        </div>

        <div class="lg:col-span-1 bg-white rounded-[2.5rem] p-8 shadow-sm border border-[var(--card-border)] sticky top-28">

            <div class="flex justify-between items-center mb-8 border-b border-[var(--card-border)] pb-4">
                <button onclick="navigateDay(-1)" class="text-gray-400 hover:text-[var(--earth-brown)] transition"><i class="fas fa-arrow-left"></i></button>
                <div class="text-center">
                    <h3 id="sidebarDateTitle" class="font-bold text-xl text-[var(--text-main)]">Today</h3>
                    <p id="sidebarDateSub" class="text-sm text-gray-500">Select a date</p>
                </div>
                <button onclick="navigateDay(1)" class="text-gray-400 hover:text-[var(--earth-brown)] transition"><i class="fas fa-arrow-right"></i></button>
            </div>

            <div id="sidebarContent" class="flex flex-col items-center text-center min-h-[300px]">
            </div>

            <button onclick="openScheduleModal()" class="w-full mt-8 bg-[var(--earth-brown)] text-white py-4 rounded-xl font-bold shadow-md hover:bg-[var(--earth-dark)] transition flex justify-center items-center gap-2">
                <i class="fas fa-calendar-plus"></i> Schedule Look
            </button>
        </div>
    </main>

    <div id="scheduleModal">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Schedule Look</h2>
            <p class="text-gray-400 text-sm mb-6">Select an outfit from your Lookbook.</p>
            <div class="space-y-4">
                <select id="outfitSelect" class="w-full p-3 border rounded-xl bg-gray-50 outline-none"></select>
                <input type="date" id="datePicker" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeScheduleModal()" class="flex-1 py-3 text-gray-500 font-bold">Cancel</button>
                <button onclick="confirmSchedule()" class="flex-1 py-3 bg-[#8c7862] text-white rounded-xl font-bold shadow-lg">Save Date</button>
            </div>
        </div>
    </div>

    <script src="../js/calendar.js"></script>
</body>
</html>
