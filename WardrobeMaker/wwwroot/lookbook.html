<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe Maker | My Lookbook</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/lookbook.css"> 
</head>
<body class="pb-20 pt-24">

    <nav class="bg-white/90 backdrop-blur-md px-6 md:px-12 py-4 flex flex-col md:flex-row justify-between items-center fixed top-0 left-0 right-0 z-50 shadow-sm border-b border-[#e6e0d5]">
        <div class="flex items-center gap-3 mb-3 md:mb-0">
            <div class="text-[#8c7862] text-2xl"><i class="fas fa-tshirt"></i></div>
            <span class="font-bold text-xl text-gray-800 tracking-tight">Wardrobe Maker</span>
        </div>
        <div class="flex flex-wrap justify-center gap-2 md:gap-3 text-gray-500">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="wardrobe.html" class="nav-item"><i class="fas fa-vest"></i> Wardrobe</a>
            <a href="create.html" class="nav-item"><i class="fas fa-wand-magic-sparkles"></i> Create</a>
            <a href="calendar.html" class="nav-item"><i class="fas fa-calendar-alt"></i> Calendar</a>
            <a href="lookbook.html" class="nav-item active-link">
                <i class="fas fa-images"></i> Lookbook
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 px-4">
        <div class="lookbook-banner p-10 text-white flex flex-col md:flex-row justify-between items-center gap-6 mb-10 shadow-xl">
            <div class="flex items-center gap-6">
                <div class="bg-white/20 p-4 rounded-3xl backdrop-blur-md">
                    <i class="fas fa-images text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-1">My Lookbook</h1>
                    <p class="opacity-90 font-light italic text-sm">Your personal gallery of style inspiration</p>
                </div>
            </div>
            <div id="lookbookStats" class="hidden md:block text-right">
                <p class="text-xs uppercase tracking-widest font-bold opacity-70">Total Looks</p>
                <p id="outfitCount" class="text-4xl font-bold">0</p>
            </div>
        </div>

        <div id="lookbookControls" class="hidden flex justify-end mb-6">
            <button onclick="LookbookApp.clearAll()" class="text-xs font-bold text-red-400 hover:text-red-600 transition flex items-center gap-2">
                <i class="fas fa-trash-can"></i> Clear All Looks
            </button>
        </div>

        <div id="lookbookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="emptyState" class="col-span-full empty-container py-32 text-center mt-4">
                <div class="text-[#e6e0d5] text-8xl mb-8">
                    <i class="fas fa-layer-group"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-3">Your Lookbook is Empty</h2>
                <p class="text-gray-400 mb-10 max-w-sm mx-auto leading-relaxed px-6">
                    Start experimenting! Mix and match items in the Create tab to save your favorite combinations here.
                </p>
                <a href="create.html" class="bg-[#8c7862] text-white px-12 py-4 rounded-2xl font-bold shadow-lg inline-flex items-center gap-3 hover:bg-[#4a4238] transition">
                    <i class="fas fa-plus"></i> Design an Outfit
                </a>
            </div>
        </div>
    </main>

    <script src="js/lookbook.js"></script>
</body>
</html>
